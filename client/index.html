<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    body { font-family: sans-serif; max-width: 360px; margin: 60px auto; padding: 0 16px; }
    label { display: block; margin: 12px 0 4px; font-size: 14px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; cursor: pointer; }
    .msg { margin-top: 16px; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
    .error { color: #b00020; }
    .ok { color: #0a7d2c; }
  </style>
</head>
<body>
  <h2>Login</h2>

  <label for="username">Username or email</label>
  <input id="username" type="text" autocomplete="username" />

  <label for="password">Password</label>
  <input id="password" type="password" autocomplete="current-password" />

  <button id="loginBtn">Log in</button>

  <div id="msg" class="msg"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const msg = $('msg');

    function show(text, ok) {
      msg.textContent = text;
      msg.className = 'msg ' + (ok ? 'ok' : 'error');
    }

    async function login() {
      const username = $('username').value.trim();
      const password = $('password').value;

      // Client-side form validation. Server validates too.
      if (!username || !password) {
        show('Both username/email and password are required.', false);
        return;
      }
      if (username.includes('@') && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(username)) {
        show('That email address does not look valid.', false);
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          show('Login failed: ' + (data.error || res.status), false);
          return;
        }

        // Token management: store it, then send it as an HTTP header.
        localStorage.setItem('token', data.token);

        const me = await fetch('/api/me', {
          headers: { 'Authorization': 'Bearer ' + data.token },
        });
        const meData = await me.json();
        show('Logged in as ' + meData.user.username +
             '\nToken stored and verified via /api/me.', true);
      } catch (err) {
        show('Network error: ' + err.message, false);
      }
    }

    $('loginBtn').addEventListener('click', login);
    $('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
